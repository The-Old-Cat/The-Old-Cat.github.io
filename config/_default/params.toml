# params.toml
mainSections = ["post"]
rssFullContent = true
favicon = "/images/AK.png"

[footer]
since = 2008

[sidebar]
emoji = "✏️"

avatar = "/images/AK.png"

[article]
[article.license]
enabled = true
default = "CC BY-NC-SA 4.0"

[widgets]
homepage = [
    { type = "search" },
    { type = "archives", params = { limit = 5 } },
    { type = "categories", params = { limit = 10 } },
    { type = "tag-cloud", params = { limit = 10 } },
]
page = [{ type = "toc" }]

[cookies]
enabled = false

[cookies.categories]
analytics = true
functional = true

[imageProcessing]
# Включаем автоматическую обработку
cover = { enabled = true }
content = { enabled = true }

# Качество и форматы
quality = 82
format = "webp" # автоматически конвертировать в WebP
resize = [
    { width = 1200, height = 630, fit = "cover", suffix = "-og" },     # для Open Graph
    { width = 800, height = 0, fit = "contain", suffix = "-preview" },
    { width = 1600, height = 0, fit = "contain" },
]

# Дополнительные настройки
anchor = "Smart"
resampleFilter = "Lanczos"
