baseURL = 'https://lab.artkov-info.ru/'
locale = "ru-ru"
title = 'Цифровой сад и мастерская'
theme = 'hugo-theme-stack'
defaultContentLanguage = 'ru'

# ==================== Изображения ====================
[imaging]
resampleFilter = "Lanczos"
quality = 82
anchor = "Smart"

# ==================== Пагинация ====================
[pagination]
pagerSize = 6

# ==================== Постоянные ссылки ====================
[permalinks]
post = "/:year/:month/:slug/"
page = "/:slug/"

# ==================== Категории ====================
[taxonomies]
category = "categories"
tag = "tags"


# ==================== Disqus (если используешь) ====================
# [services.disqus]
# shortname = "your-disqus-shortname" # ← Замени на свой

# ==================== Дополнительные полезные настройки ====================
[markup.goldmark.renderer]
unsafe = true # для рендеринга HTML в Markdown

[markup.highlight]
noClasses = false
codeFences = true
guessSyntax = true
lineNos = true

[module]
[[module.imports]]
path = "github.com/KKKZOZ/hugo-admonitions"
